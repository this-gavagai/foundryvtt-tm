apply plugin: 'com.android.application'

// Resolve release-signing material from, in order: environment variables (used
// on CI, where the keystore is a base64 secret decoded to a temp file), then a
// local keystore.properties outside the repo (developer machines — no env prefix
// needed per build). When neither is present the release build stays unsigned,
// so contributors without the keystore can still run assemble* without errors.
def keystoreFile = System.getenv("ANDROID_KEYSTORE_FILE")
def keystorePassword = System.getenv("ANDROID_KEYSTORE_PASSWORD")
def keyAliasName = System.getenv("ANDROID_KEY_ALIAS")
// Named to avoid colliding with the signingConfig DSL setter of the same name —
// `keyPassword keyPassword` makes Groovy call the String variable as a method.
def keyPasswordValue = System.getenv("ANDROID_KEY_PASSWORD")

def localSigningProps = new File(System.getProperty("user.home"), ".config/tablemate-android/keystore.properties")
if (!keystoreFile && localSigningProps.exists()) {
    def props = new Properties()
    localSigningProps.withInputStream { props.load(it) }
    keystoreFile = props.getProperty("storeFile")
    keystorePassword = props.getProperty("storePassword")
    keyAliasName = props.getProperty("keyAlias")
    keyPasswordValue = props.getProperty("keyPassword")
}

android {
    namespace = "io.github.thisgavagai.tablemate"
    compileSdk = rootProject.ext.compileSdkVersion
    defaultConfig {
        applicationId "io.github.thisgavagai.tablemate"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        // Sideloaded upgrades require a monotonically increasing versionCode.
        // fastlane derives it from the release tag (see the android build lane);
        // local untagged builds fall back to 1.
        versionCode System.getenv("ANDROID_VERSION_CODE") ? System.getenv("ANDROID_VERSION_CODE").toInteger() : 1
        versionName System.getenv("APP_VERSION") ?: "1.0"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
             // Files and dirs to omit from the packaged assets dir, modified to accommodate modern web apps.
             // Default: https://android.googlesource.com/platform/frameworks/base/+/282e181b58cf72b6ca770dc7ca5f91f135444502/tools/aapt/AaptAssets.cpp#61
            ignoreAssetsPattern = '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }
    signingConfigs {
        release {
            if (keystoreFile) {
                storeFile file(keystoreFile)
                storePassword keystorePassword
                keyAlias keyAliasName
                keyPassword keyPasswordValue
            }
        }
    }
    buildTypes {
        release {
            if (keystoreFile) {
                signingConfig signingConfigs.release
            }
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
        }
    }
    // Name the release APK tabulamensa.apk instead of the default app-release.apk,
    // so the sideload artifact has a stable, version-less filename.
    applicationVariants.all { variant ->
        if (variant.buildType.name == "release") {
            variant.outputs.all { output ->
                output.outputFileName = "tabulamensa.apk"
            }
        }
    }
}

repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation project(':capacitor-android')
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')
}

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}
