name: build-and-release
run-name: ${{ github.actor }} triggered a build and release
on:
  push:
    tags:
      - '*'
jobs:
  build-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Install
        run: npm install

      - name: Build
        # Bake the git tag into the app bundle (Vite reads APP_VERSION) so the
        # app/module version handshake compares the real release, not the dev
        # placeholder. The package.json/module.json edits below run AFTER the
        # build, so they can't be the source of the bundled app version.
        run: APP_VERSION=${{ github.ref_name }} npm run build-only

      - name: update package.json version info
        uses: jossef/action-set-json-field@v2.1
        with:
          file: package.json
          field: version
          value: ${{ github.ref_name }}

      - name: update module.json version info
        uses: jossef/action-set-json-field@v2.1
        with:
          file: tablemate/module.json
          field: version
          value: ${{ github.ref_name }}

      - name: update module.json version info
        uses: jossef/action-set-json-field@v2.1
        with:
          file: tablemate/module.json
          field: download
          value: https://github.com/this-gavagai/foundryvtt-tm/releases/download/${{ github.ref_name }}/tablemate.zip

      - name: Zip Files
        working-directory: ./tablemate
        run: zip -r ./tablemate.zip ./*

      - name: Create Version Release
        id: create_version_release
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: false
          draft: false
          prerelease: true
          generateReleaseNotes: true
          token: ${{ secrets.WORKFLOW_KEY }}
          artifacts: './tablemate/module.json,./tablemate/tablemate.zip'

  ios-testflight:
    # Build & upload the iOS app to TestFlight once the GitHub release exists.
    needs: build-release
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Install npm dependencies
        run: npm install

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Import signing certificate
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.IOS_DIST_CERT_BASE64 }}
          p12-password: ${{ secrets.IOS_DIST_CERT_PASSWORD }}

      - name: List signing identities (diagnostic)
        # Expect to see "Apple Distribution: Peter Graif". If only "Apple
        # Development" appears, the IOS_DIST_CERT_BASE64 secret is the wrong cert.
        run: security find-identity -v -p codesigning

      - name: Build and upload to TestFlight
        env:
          # The git tag (e.g. alpha-0106) — baked into the web bundle, the
          # CFBundleVersion build number, and the TestFlight changelog.
          APP_VERSION: ${{ github.ref_name }}
          IOS_DEVELOPMENT_TEAM: ${{ secrets.IOS_DEVELOPMENT_TEAM }}
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_KEY_CONTENT }}
        run: bundle exec fastlane ios beta

  android-build:
    # Build a signed APK and attach it to the GitHub release for manual install
    # (sideloading) — the Android analog of the iOS TestFlight upload.
    needs: build-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install npm dependencies
        run: npm install

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Decode signing keystore
        # The keystore (a self-signed cert + private key) is stored as a base64
        # secret; write it to a temp file that build.gradle reads via env.
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > "$RUNNER_TEMP/release.jks"

      - name: Build signed APK
        env:
          # The git tag (e.g. alpha-0106) — baked into the web bundle, the
          # versionName, and (its digits) the versionCode.
          APP_VERSION: ${{ github.ref_name }}
          ANDROID_KEYSTORE_FILE: ${{ runner.temp }}/release.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: bundle exec fastlane android build

      - name: Attach APK to the release
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          omitBodyDuringUpdate: true
          omitNameDuringUpdate: true
          omitPrereleaseDuringUpdate: true
          replacesArtifacts: true
          token: ${{ secrets.WORKFLOW_KEY }}
          tag: ${{ github.ref_name }}
          artifacts: ./android/app/build/outputs/apk/release/app-release.apk
