name: ci
run-name: CI for ${{ github.ref_name }}
on:
  push:
    branches:
      - main
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm

      - name: Install
        run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Lint
        # The package.json `lint` script auto-fixes; CI must only report.
        run: npx eslint .

      - name: Test
        run: npx vitest run
